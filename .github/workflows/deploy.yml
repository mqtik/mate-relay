name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Lowercase owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ env.OWNER }}/mate-relay:latest
            ghcr.io/${{ env.OWNER }}/mate-relay:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Lowercase owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.UPCLOUD_HOST }}
          username: ${{ secrets.UPCLOUD_USER }}
          key: ${{ secrets.UPCLOUD_SSH_KEY }}
          passphrase: ${{ secrets.UPCLOUD_SSH_PASSPHRASE }}
          source: deploy/compose.prod.yaml
          target: /opt/mate-relay/
          strip_components: 1

      - name: Deploy
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_ACTOR: ${{ github.actor }}
          OWNER: ${{ env.OWNER }}
          SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.UPCLOUD_HOST }}
          username: ${{ secrets.UPCLOUD_USER }}
          key: ${{ secrets.UPCLOUD_SSH_KEY }}
          passphrase: ${{ secrets.UPCLOUD_SSH_PASSPHRASE }}
          envs: GHCR_TOKEN,GHCR_ACTOR,OWNER,SHA
          script: |
            set -e
            export PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_ACTOR" --password-stdin
            cd /opt/mate-relay
            sed -i "s|^RELAY_IMAGE=.*|RELAY_IMAGE=ghcr.io/${OWNER}/mate-relay:${SHA}|" .env
            docker compose -f compose.prod.yaml pull relay
            docker compose -f compose.prod.yaml up -d --force-recreate relay
            docker logout ghcr.io
            docker image prune -f
